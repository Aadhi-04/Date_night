<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yes Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Will you be my valentine? 💖</h1>
        <div class="buttons">
            <!-- The onclick event calls the 'accepted' function in script.js -->
            <button id="yesBtn" onclick="accepted()">Yes</button>
            <!-- The onmouseover event calls the 'moveNoButton' function in script.js -->
            <button id="noBtn" onmouseover="moveNoButton()">No</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
